name: NativeMacOSFixture
options:
  bundleIdPrefix: dev.fastforge
  deploymentTarget:
    macOS: "13.0"
targets:
  NativeMacOSFixture:
    type: application
    platform: macOS
    sources: [Sources]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.fastforge.native-macos-fixture
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
        CODE_SIGNING_ALLOWED: false
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        ENABLE_HARDENED_RUNTIME: false
        COMBINE_HIDPI_IMAGES: true
