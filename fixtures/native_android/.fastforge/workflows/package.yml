# Test fixture for the Gradle Builder integration tests in
# crates/app_builder/tests/gradle_builder.rs.
#
# Static reference only: Phase 1 tests call the builder crate API directly, not
# `fastforge workflow run`. Documents the equivalent CLI-level shape for when
# Phase 2 wires up `apps/cli/tests/workflow_run.rs` against this fixture.
name: Gradle Builder smoke package

on:
  workflow_dispatch:

jobs:
  apk:
    name: Android APK
    steps:
      - name: Package APK
        uses: fastforge/package@v1
        with:
          platform: android
          target: apk
          output: dist/

  aab:
    name: Android AAB
    steps:
      - name: Package AAB
        uses: fastforge/package@v1
        with:
          platform: android
          target: aab
          output: dist/
