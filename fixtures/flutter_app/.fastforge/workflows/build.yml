# Test fixture for the Flutter Builder integration tests in
# crates/app_builder/tests/flutter_builder.rs.
#
# This file is a static reference only: Phase 1 tests call the builder crate
# API directly (not the CLI/workflow engine), so `fastforge workflow run`
# is not exercised here yet. It documents the equivalent CLI-level shape for
# when Phase 2 wires up `apps/cli/tests/workflow_run.rs` against this fixture.
name: Flutter Builder smoke build

on:
  workflow_dispatch:

jobs:
  android-apk:
    name: Android APK
    steps:
      - name: Build APK
        uses: fastforge/build@v1
        with:
          platform: android
          target: apk

  web:
    name: Web
    steps:
      - name: Build Web
        uses: fastforge/build@v1
        with:
          platform: web

  macos:
    name: macOS
    steps:
      - name: Build macOS
        uses: fastforge/build@v1
        with:
          platform: macos

  ios:
    name: iOS
    steps:
      - name: Build IPA
        uses: fastforge/build@v1
        with:
          platform: ios
          build-args: '{"export-method":"development"}'
