# Test fixture for the Gradle Builder flavor-handling integration tests in
# crates/app_builder/tests/gradle_builder.rs.
#
# Static reference only: Phase 1 tests call the builder crate API directly, not
# `fastforge workflow run`.
name: Gradle Builder flavor smoke package

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: Build flavor
        default: dev

jobs:
  apk:
    name: Android APK (flavor)
    steps:
      - name: Package APK
        uses: fastforge/package@v1
        with:
          platform: android
          target: apk
          output: dist/
          build-args: '{"flavor":"${{ inputs.flavor }}"}'

  aab:
    name: Android AAB (flavor)
    steps:
      - name: Package AAB
        uses: fastforge/package@v1
        with:
          platform: android
          target: aab
          output: dist/
          build-args: '{"flavor":"${{ inputs.flavor }}"}'
