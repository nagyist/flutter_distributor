name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.7.0)"
        required: true
        type: string

jobs:
  preflight:
    name: Preflight Check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve_version.outputs.version }}
    steps:
      - name: Resolve version
        id: resolve_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Strip leading 'v' from tag name
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Check if release already exists
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.resolve_version.outputs.version }}"
          TAG="v$VERSION"
          echo "Checking if release $TAG already exists..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          if [ "$STATUS" = "200" ]; then
            echo "::error::Release $TAG already exists. Aborting."
            exit 1
          fi
          echo "Release $TAG does not exist. Proceeding."

  build:
    name: Build ${{ matrix.target }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: darwin
            arch: aarch64
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: darwin
            arch: x86_64
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux
            arch: aarch64
            archive_ext: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux
            arch: x86_64
            archive_ext: tar.gz
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            platform: windows
            arch: aarch64
            archive_ext: zip
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows
            arch: x86_64
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target ${{ matrix.target }} -p fastforge

      - name: Prepare archive (Unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          ARCHIVE_NAME="fastforge-$VERSION-${{ matrix.target }}"
          mkdir -p dist/$ARCHIVE_NAME
          cp target/${{ matrix.target }}/release/fastforge dist/$ARCHIVE_NAME/fastforge
          cd dist
          tar -czf "${ARCHIVE_NAME}.tar.gz" "$ARCHIVE_NAME"
          echo "ARCHIVE_PATH=dist/${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Prepare archive (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $VERSION = "${{ needs.preflight.outputs.version }}"
          $ARCHIVE_NAME = "fastforge-$VERSION-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$ARCHIVE_NAME"
          Copy-Item "target/${{ matrix.target }}/release/fastforge.exe" "dist/$ARCHIVE_NAME/fastforge.exe"
          Compress-Archive -Path "dist/$ARCHIVE_NAME" -DestinationPath "dist/$ARCHIVE_NAME.zip"
          echo "ARCHIVE_PATH=dist/$ARCHIVE_NAME.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "ARCHIVE_NAME=$ARCHIVE_NAME.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create Release (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          TAG="v$VERSION"
          gh release create "$TAG" \
            --title "$TAG" \
            --draft \
            dist/*

      - name: Upload assets to existing Release (release event)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" dist/* --clobber
